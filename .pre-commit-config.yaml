repos:
  - repo: local
    hooks:
      - id: large-files
        name: large-files (1 MB)
        entry: bash -c 'for f in "$@"; do if [ -f "$f" ] && [ "$(wc -c <"$f")" -gt 1048576 ]; then echo "$f > 1 MB"; exit 1; fi; done' --
        language: system
        stages: [pre-commit]
      - id: gitleaks
        name: gitleaks protect --staged
        entry: gitleaks protect --staged --no-banner
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: ruff
        name: ruff check
        entry: ruff check
        language: system
        types_or: [python]
        stages: [pre-commit]
      - id: ruff-format
        name: ruff format --check
        entry: ruff format --check
        language: system
        types_or: [python]
        stages: [pre-commit]
      - id: shellcheck
        name: shellcheck
        entry: shellcheck --severity=warning
        language: system
        types: [shell]
        stages: [pre-commit]
