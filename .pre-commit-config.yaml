repos:
  - repo: local
    hooks:
      - id: large-files
        name: large-files (1 MB)
        entry: bash -c 'for f in "$@"; do if [ -f "$f" ] && [ "$(wc -c <"$f")" -gt 1048576 ]; then echo "$f > 1 MB"; exit 1; fi; done' --
        language: system
        stages: [pre-commit]
      - id: gitleaks
        name: gitleaks git --pre-commit --staged (default rules)
        entry: gitleaks git --pre-commit --staged --redact --verbose --no-banner
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: gitleaks-custom
        name: gitleaks git --pre-commit --staged (custom rules, if .gitleaks-custom.toml present)
        entry: bash -c 'if [ -f .gitleaks-custom.toml ]; then exec gitleaks git --pre-commit --staged --redact --verbose --no-banner -c .gitleaks-custom.toml; fi'
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: ruff
        name: ruff check
        entry: ruff check
        language: system
        types_or: [python]
        stages: [pre-commit]
      - id: ruff-format
        name: ruff format --check
        entry: ruff format --check
        language: system
        types_or: [python]
        stages: [pre-commit]
      - id: shellcheck
        name: shellcheck
        entry: shellcheck --severity=warning
        language: system
        types: [shell]
        stages: [pre-commit]
      - id: readme-skills-table
        name: README skill table in sync
        entry: python3 scripts/gen-skills-table.py
        language: system
        pass_filenames: false
        files: ^(\.claude/skills/.+/SKILL\.md|scripts/gen-skills-table\.py|README\.md)$
        stages: [pre-commit]
      - id: plugin-manifests
        name: plugin manifests in sync
        entry: python3 scripts/gen-plugin-manifests.py
        language: system
        pass_filenames: false
        files: ^(\.claude/skills/.+/SKILL\.md|scripts/gen-plugin-manifests\.py|\.claude-plugin/marketplace\.json|\.claude/skills/.+/\.claude-plugin/plugin\.json)$
        stages: [pre-commit]
