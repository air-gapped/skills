---
# Cisco CBS250/CBS350 (+ Catalyst 1200/1300 successors) — curated health module.
#
# autoresearch 2026-07-23: replaced full 1.3.6.1.4.1.9.6.1 walk (4034 metrics;
# full CISCOSB-tree walks are known to hang scrapes and can crash the switch's
# SNMP process — prometheus/snmp_exporter#1229, Cisco kmgmt2884) with the
# specific CISCOSB health OIDs that LibreNMS/Centreon poll in production.
# See ../references/research-report.md
#
# Interfaces intentionally NOT here — scrape with the stock module instead:
#   module=if_mib,cisco_cbs
# Notes: CBS has NO memory-utilization OID at all. CBS220 does not implement
# the CISCOSB private tree (use if_mib + ENTITY-MIB only). SNMP is disabled by
# default on CBS — enable via web UI (Advanced > SNMP) or CLI, and make sure
# the community's view includes the private tree.
#
# Generate: go run . -m mibs -g generator-cisco.yml -o snmp-cisco.yml

auths:
  public_v2:
    version: 2

modules:
  cisco_cbs:
    walk:
      # CPU load, percent (101 means "not measured"); scalars under rndMng
      - CISCOSB-rndMng::rlCpuUtilDuringLastSecond
      - CISCOSB-rndMng::rlCpuUtilDuringLastMinute
      - CISCOSB-rndMng::rlCpuUtilDuringLast5Minutes
      # Environment: fan/PSU state enums, temperature (really CPU temp; 0 = no
      # sensor), fan RPM (0 = fanless)
      # NOTE: named walks, not numeric — the numeric .101.83/.101.107 walks
      # silently resolved to nothing in a mixed MIB dir (overlapping arc
      # definitions); always verify generated output contains expected metrics.
      - CISCOSB-HWENVIROMENT::rlEnvMonFanStatusTable
      - CISCOSB-HWENVIROMENT::rlEnvMonSupplyStatusTable
      - CISCOSB-HWENVIROMENT::rlEnvFanDataTable
      # Per-stack-unit PSU status + temp sensor with warning threshold
      - CISCOSB-Physicaldescription-MIB::rlPhdUnitEnvParamTable
      # Inventory strings (become gauge=1 metrics with the value as a label)
      - CISCOSB-Physicaldescription-MIB::rlPhdUnitGenParamSoftwareVersion
      - CISCOSB-Physicaldescription-MIB::rlPhdUnitGenParamFirmwareVersion
      - CISCOSB-Physicaldescription-MIB::rlPhdUnitGenParamHardwareVersion
      - CISCOSB-Physicaldescription-MIB::rlPhdUnitGenParamSerialNum
      - CISCOSB-Physicaldescription-MIB::rlPhdUnitGenParamServiceTag
      - CISCOSB-Physicaldescription-MIB::rlPhdUnitGenParamModelName
      # Stack membership/topology (harmless on standalone units)
      - CISCOSB-STACK-MIB::rlStackActiveUnitIdTable
      - CISCOSB-STACK-MIB::rlStackUnitMode
      - CISCOSB-STACK-MIB::rlStackTopology
      - CISCOSB-STACK-MIB::rlStackMode
      # PoE: per-port milliwatts (vendor) + standard RFC 3621 budget/status.
      # pethMainPseTable is the "PoE budget nearly exhausted" alert source.
      # All empty on non-PoE models, which is fine.
      - CISCOSB-POE-MIB::rlPethPsePortOutputPower
      - POWER-ETHERNET-MIB::pethMainPseTable
      - POWER-ETHERNET-MIB::pethPsePortDetectionStatus
      - POWER-ETHERNET-MIB::pethPsePortPowerClassifications
      # RMON per-port error taxonomy — distinguishes bad cable/DAC (CRC/align,
      # fragments) from duplex/congestion issues (collisions); finer than
      # ifInErrors. etherStatsIndex normally maps 1:1 to ifIndex (verify on hw).
      - RMON-MIB::etherStatsCRCAlignErrors
      - RMON-MIB::etherStatsFragments
      - RMON-MIB::etherStatsJabbers
      - RMON-MIB::etherStatsCollisions
      - RMON-MIB::etherStatsUndersizePkts
      - RMON-MIB::etherStatsOversizePkts
    lookups:
      - source_indexes: [rlEnvMonFanStatusIndex]
        lookup: CISCOSB-HWENVIROMENT::rlEnvMonFanStatusDescr
      - source_indexes: [rlEnvMonSupplyStatusIndex]
        lookup: CISCOSB-HWENVIROMENT::rlEnvMonSupplyStatusDescr
    overrides:
      rlEnvMonFanStatusDescr: {ignore: true}
      rlEnvMonSupplyStatusDescr: {ignore: true}
